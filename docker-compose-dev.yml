services:
    db:
        image: postgres:latest
        container_name: db
        restart: always
        environment:
            POSTGRES_USER: ${POSTGRES_USER:?database user not set}
            POSTGRES_DB: ${POSTGRES_DB_DEV:?database name not set}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?database password not set}
        volumes:
            - postgres-data:/var/lib/postgresql/data

    adminer:
        image: adminer:latest
        container_name: adminer
        restart: always
        ports:
            - 8080:8080

    db-filler:
        container_name: db-filler
        environment:
            POSTGRES_USER: ${POSTGRES_USER:?database user not set}
            POSTGRES_DB: ${POSTGRES_DB_DEV:?database name not set}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?database password not set}
        build:
            context: ./dbscripts
        depends_on:
            - db

    api-dev:
        container_name: api-dev
        build:
            context: ./api
            dockerfile: Dockerfile-dev
        ports:
            - 1235:1235
        depends_on:
            - db
            - db-filler

volumes:
    postgres-data:
