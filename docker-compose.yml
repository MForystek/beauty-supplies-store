services:
    db:
        image: postgres:latest
        container_name: db
        restart: always
        environment:
            POSTGRES_USER: ${POSTGRES_USER:?database user not set}
            POSTGRES_DB: ${POSTGRES_DB_PROD:?database name not set}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?database password not set}
        volumes:
            - postgres-data:/var/lib/postgresql/data

    api:
        container_name: api
        build:
            context: ./api
        ports:
            - 1234:1234
        depends_on:
            - db

volumes:
    postgres-data:
